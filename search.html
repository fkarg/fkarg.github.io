---
layout: search
title: Search through Cogitate
published: true
---
<form action="{{ 'search' | relative_url }}" method="get">
  <label for="search-box">Search:</label>
  <input type="text" id="search-box" name="query">
  <input type="submit" value="search">
</form>

<div class="posts-list" id="search-results"></div>

<script>
  {% assign date_format = site.date_format | default: "%B %-d, %Y" %}
  {% assign excerpt_length = site.excerpt_length | default: 50 %}
  window.store = {
    {% for post in site.posts %}

      {%- capture thumbnail -%}
        {% if post.thumbnail-img %}
          {{ post.thumbnail-img }}
        {% elsif post.cover-img %}
          {% if post.cover-img.first %}
            {{ post.cover-img[0].first.first }}
          {% else %}
            {{ post.cover-img }}
          {% endif %}
        {% else %}
        {% endif %}
      {% endcapture %}
      {% assign thumbnail=thumbnail | strip %}

      "{{ post.url | slugify }}": {
        "title": "{{ post.title | xml_escape }}",
        "subtitle": "{{ post.subtitle | xml_escape }}",
        "content": {{ post.content | strip_html | jsonify }},
        "post_entry": {{ post.excerpt | strip_html | xml_escape | truncatewords: excerpt_length | jsonify}},
        "url": "{{ post.url | xml_escape }}",
        "date": "{{ post.date | date: date_format }}",
        // "thumbnail": "",
        "thumbnail": "{% if thumbnail != "" %}{{ thumbnail | absolute_url }}{% endif %}",
        "tags": "{% for tag in post.tags %}<a href=\"{{ 'tags' | absolute_url }}#{{- tag -}}\">{{- tag -}}</a> {% endfor %}"
      }
      {% unless forloop.last %},{% endunless %}
    {% endfor %}
  };
</script>

<script src="/assets/js/lunr.js"></script>
<script src="/assets/js/search.js"></script>
