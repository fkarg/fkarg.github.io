# --- Comments --- #

# To use Utterances comments: (0) uncomment the following section, (1) fill in
# "repository" (make sure the repository is public), (2) Enable Issues in your repository,
# (3) Install the Utterances app in your repository https://github.com/apps/utterances
# See more details about the parameters below at https://utteranc.es/
#utterances:
#  repository: # GitHub username/repository eg. "daattali/beautiful-jekyll"
#  issue-term: title   # Mapping between blog posts and GitHub issues
#  theme: github-light # Utterances theme
#  label: blog-comments # Label that will be assigned to GitHub Issues created by Utterances

# To use Staticman comments, first invite `staticmanlab` as a collaborator to your repository and
# accept the invitation by going to `https://staticman3.herokuapp.com/v3/connect/github/<username>/<repo-name>`.
# Then uncomment the following section and fill in "repository" and "branch".
# If you want to use reCaptcha for staticman (optional for spam protection), then fill
# in the "siteKey" and "secret" parameters below and also in `staticman.yml`.
# See more details at https://staticman.net/

# Staticman support
staticman:
  repository : fkarg/fkarg.github.io
  # GitHub username/repository eg. "daattali/beautiful-jekyll"
  branch     : master
      # eg. "master" If you're not using `master` branch, then you also need to update the `branch` parameter in `staticman.yml`
  endpoint   : https://staticmanat.herokuapp.com/v3/entry/github/
#   (optional) URL of your own deployment, with a trailing slash eg. https://<your-api>/v3/entry/github/ (will fallback to a public GitLab instance)
#   reCaptcha:
#     # reCaptcha for Staticman (OPTIONAL)
#     # If you use reCaptcha, you must also set these parameters in staticman.yml
#     siteKey  : "6LfqSJ8UAAAAAHcR84-QqKY2ZsbAzxx21YDRkgjq"
#         # Use your own site key, you need to apply for one on Google
#         #     secret   : "6LduRZ8UAAAAAPOsb1L_HFhrIXiIbtLuNpWJ44sy"
#         #     secret   : "6LfqSJ8UAAAAAENw93G5V3gP5ul5OUpkDbzM_DFo"
#     secret   : ""
        # ENCRYPT your password by going to https://staticman3.herokuapp.com/v3/encrypt/<your-site-secret>


# --- Misc --- #

# Character used to separate site title and description in HTML document title
# and RSS feed title
title-separator: "-"

# Ruby Date Format to show dates of posts
date_format: "%B %-d, %Y"

# Facebook App ID
#fb_app_id: ""


# --- You don't need to touch anything below here (but you can if you want) --- #

# Output options (more information on Jekyll's site)
timezone: "Europe/Berlin"
markdown: kramdown
highlighter: rouge
permalink: /:year-:month-:day-:title/
paginate: 5

kramdown:
  input: GFM
  math_engine: mathjax

# Default YAML values (more information on Jekyll's site)
defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      published: true
      comments: true  # add comments to all blog posts
      social-share: true # add social media sharing buttons to all blog posts
      readtime: true # add word count on all blog posts
      tex: false  # deactivate tex-support globally. activate individually.
  -
    scope:
      path: "staged"
    values:
      layout: "post"
      readtime: true
      published: true
  -
    scope:
      path: "" # all files
    values:
      layout: "page"
      show-avatar: true

# Exclude these files from production site
exclude:
  - CHANGELOG.md
  - CNAME
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - screenshot.png
    # other stuff
  - drafts/
  - docs/
  - staged/*.py
  - staged/*.txt
    # nix-shell stuff
  - Gemfile-nix-shell
  - default.nix
  - gemset.nix
  - vendor
  - result

plugins:
  - jekyll-paginate
  - jekyll-sitemap

