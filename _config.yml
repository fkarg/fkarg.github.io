# --- Basic options --- #

# Name of website
title: Cogitate

# Short description of your site
description: Exploring thoughts

# Canonical site URL. www.fkarg.me is canonical; blog.fkarg.de is a mirror
# served from the same repo on the VPS. Both emit canonical/feed/sitemap URLs
# pointing here so SEO consolidates on one host.
url: "https://www.fkarg.me"

# Your name to show in the footer
author: Felix Karg

# --- List of links in the navigation bar --- #

navbar-links:
  More:
    - Referrals: "home/referrals"
    - Privacy Policy: "home/privacy_policy"
    - Favicon Attribution: "home/attribution"
  Projects:
    - confertus: "confertus"
  Search: "search"
  Now: "home/now"
  About: "home/about"

# --- Logo --- #

# Image to show in the navigation bar - works best with a square image
# Remove this parameter if you don't want an image in the navbar
# avatar: "/assets/img/avatar-icon.png"
avatar: "/assets/img/profile_pic_sq.jpeg"

# By default, the image is cut into a circle. You can disable this behaviour by
# setting 'round-avatar: false'
# round-avatar: true

# If you want to have an image logo in the top-left corner instead of the title text,
# then specify the following parameter
# title-img: /path/to/image


# --- Footer options --- #

# Select the social network links that you want to show in the footer.
# Uncomment the links you want to show and add your information to each one.
# If you don't want to show a link to an RSS feed, set rss to "false".
social-network-links:
  rss: true
  email: "f.karg10@gmail.com"
  github: fkarg
  calendly: fkarg
  twitter: fkarg10
    # telegram: fkarg10
    # linkedin: felix-karg-33973b178
    # stackoverflow: "3162351/fkarg"
    # telephone: +4917681501822
    # steam: fkarg

#  facebook: daattali
#  reddit: yourname
#  xing: yourname
#  snapchat: yourname
#  instagram: yourname
#  youtube: user/yourname
#  spotify: yourname
#  twitch: yourname
#  yelp: yourname
#  mastodon: instance.url/@username
#  ORCID: your ORCID ID
#  google-scholar: your google scholar

# --- General options --- #

# Select which social network share links to show in posts
share-links-active:
  twitter: true
  facebook: true
  linkedin: true
  vk: false

# How to display the link to your website in the footer
# Remove this if you don't want a link in the footer
# url-pretty: "fkarg.github.io"

# Create a "tags" index page and make tags on each post clickable
link-tags: true

# Excerpt Word Length - Truncates the excerpt to the specified number of words on the index page
excerpt_length: 50
excerpt_separator: "* TOC"


# The keywords to associate with your website, for SEO purposes
#keywords: "my,list,of,keywords"

# --- Colours / background image --- #

# Personalize the colours in your website. Colour values can be any valid CSS colour

navbar-col: "#EAEAEA"
navbar-text-col: "#404040"
navbar-border-col: "#DDDDDD"
page-col: "#FFFFFF"
text-col: "#404040"
link-col: "#008AFF"
hover-col: "#0085A1"
footer-col: "#EAEAEA"
footer-text-col: "#777777"
footer-link-col: "#404040"

# Alternatively, the navbar, footer, and page background can be set to use background images
# instead of colour

#navbar-img: "/assets/img/bgimage.png"
#footer-img: "/assets/img/bgimage.png"
#page-img: "/assets/img/bgimage.png"

# Suggest a colour for mobile browsers to use as the browser's theme. This is only supported by a few mobile browsers.
#mobile-theme-col: "#0085A1"

# For any extra customization, you can include additional CSS files in every page on your site
#site-css:
#  - "/assets/css/custom-styles.css"

