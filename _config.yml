# --- Comments --- #
# Utterances backs new comments via GitHub Issues. To activate:
#   1. Enable Issues on fkarg/fkarg.github.io (already on).
#   2. Install the Utterances GitHub App and grant it access to the repo:
#      https://github.com/apps/utterances
# Once both are done, the widget below renders the comment thread.
utterances:
  repository: fkarg/fkarg.github.io
  issue-term: pathname  # keyed by URL path (stable across title changes)
  theme: github-light
  label: blog-comments

# Staticman: form removed (`staticmanat.herokuapp.com` died with Heroku free
# dynos in Nov 2022). The static display of historical comments under
# `_data/comments/<slug>/` still renders — `_includes/staticman-comments.html`
# gates that display on these two keys, so they must remain.
staticman:
  repository: fkarg/fkarg.github.io
  branch: master


# --- Misc --- #

# Character used to separate site title and description in HTML document title
# and RSS feed title
title-separator: "-"

# Ruby Date Format to show dates of posts
date_format: "%B %-d, %Y"

# Facebook App ID
#fb_app_id: ""


# --- You don't need to touch anything below here (but you can if you want) --- #

# Output options (more information on Jekyll's site)
timezone: "Europe/Berlin"
markdown: kramdown
highlighter: rouge
permalink: /:year-:month-:day-:title/
paginate: 5

kramdown:
  input: GFM
  math_engine: mathjax

# Default YAML values (more information on Jekyll's site)
defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      published: true
      comments: true  # add comments to all blog posts
      social-share: true # add social media sharing buttons to all blog posts
      readtime: true # add word count on all blog posts
      tex: false  # deactivate tex-support globally. activate individually.
  -
    scope:
      path: "staged"
    values:
      layout: "post"
      readtime: true
      published: true
  -
    scope:
      path: "" # all files
    values:
      layout: "page"
      show-avatar: true

# Exclude these files from production site
exclude:
  - CHANGELOG.md
  - CLAUDE.md
  - CNAME
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - screenshot.png
    # other stuff
  - drafts/
  - docs/
  - staged/*.py
  - staged/*.txt
    # nix-shell stuff
  - Gemfile-nix-shell
  - shell.nix
  - default.nix
  - gemset.nix
  - vendor
  - result
  - .jekyll_cache
  - .gitignore
  - .git
  - blog.conf

plugins:
  - jekyll-paginate
  - jekyll-sitemap


