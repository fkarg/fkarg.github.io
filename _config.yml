# google_analytics: "UA-139307239-1"

# Google Tag Manager ID
#gtm: ""


# --- Comments --- #
# No comment backend wired up. Posts still set `comments: true` by default
# (see `defaults:` below) so the call site in `_includes/comments.html`
# still fires, but it only renders Disqus / Facebook (both also dormant —
# their includes gate on `site.disqus` / `site.fb-comment` which aren't
# set). Plan: Remark42 self-hosted, see TODO in `../site-setup/README.md`.


# --- Misc --- #

# Character used to separate site title and description in HTML document title
# and RSS feed title
title-separator: "-"

# Ruby Date Format to show dates of posts
date_format: "%B %-d, %Y"

# Facebook App ID
#fb_app_id: ""


# --- You don't need to touch anything below here (but you can if you want) --- #

# Output options (more information on Jekyll's site)
timezone: "Europe/Berlin"
markdown: kramdown
highlighter: rouge
permalink: /:year-:month-:day-:title/
paginate: 5

kramdown:
  input: GFM
  math_engine: mathjax

# Default YAML values (more information on Jekyll's site)
defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      published: true
      comments: true  # add comments to all blog posts
      social-share: true # add social media sharing buttons to all blog posts
      readtime: true # add word count on all blog posts
      tex: false  # deactivate tex-support globally. activate individually.
  -
    scope:
      path: "staged"
    values:
      layout: "post"
      readtime: true
      published: true
  -
    scope:
      path: "" # all files
    values:
      layout: "page"
      show-avatar: true

# Exclude these files from production site
exclude:
  - AGENTS.md
  - CHANGELOG.md
  - CLAUDE.md
  - CNAME
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - screenshot.png
    # other stuff
  - drafts/
  - docs/
  - staged/*.py
  - staged/*.txt
    # nix-shell stuff
  - Gemfile-nix-shell
  - shell.nix
  - default.nix
  - gemset.nix
  - vendor
  - result
  - .jekyll_cache
  - .gitignore
  - .git
  - blog.conf

plugins:
  - jekyll-paginate
  - jekyll-sitemap


